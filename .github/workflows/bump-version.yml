name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump-type:
        description: Bump type
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the default branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          # A PAT allows tag pushes to trigger any downstream workflows.
          token: ${{ secrets.PAT_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - name: Install cargo-edit
        run: cargo install cargo-edit --version 0.13.7 --locked --no-default-features --features set-version
      - name: Bump Cargo package version
        id: bump
        env:
          BUMP_TYPE: ${{ inputs.bump-type }}
        run: |
          previous_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[0].version')"
          cargo set-version --bump "$BUMP_TYPE"
          current_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[0].version')"

          echo "previous-version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "current-version=$current_version" >> "$GITHUB_OUTPUT"
      - name: Commit, tag, and push
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PREVIOUS_VERSION: ${{ steps.bump.outputs.previous-version }}
          CURRENT_VERSION: ${{ steps.bump.outputs.current-version }}
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Bump version: $PREVIOUS_VERSION → $CURRENT_VERSION"
          git tag -a "v$CURRENT_VERSION" -m "Bump version: $PREVIOUS_VERSION → $CURRENT_VERSION"
          git push --atomic origin "HEAD:$DEFAULT_BRANCH" "v$CURRENT_VERSION"
      - name: Check
        run: echo "Version was bumped from ${{ steps.bump.outputs.previous-version }} to ${{ steps.bump.outputs.current-version }}!"
