services:
  hnbot:
    build:
      context: .
    command: ["serve"]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command:
      - sh
      - -ec
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -qx PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
